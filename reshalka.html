<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 Решатель Задач</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        h1 { text-align: center; font-size: 2.2em; color: #333; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }

        .api-box {
            background: #f0f8ff;
            border: 2px solid #0099cc;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 20px;
        }
        .api-box h3 { color: #0099cc; margin-bottom: 8px; }
        .api-box a { color: #0099cc; }
        .api-row { display: flex; gap: 8px; margin-top: 10px; }
        .api-row input {
            flex: 1;
            padding: 10px 14px;
            border: 2px solid #ccc;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.9em;
        }
        .api-row input:focus { outline: none; border-color: #0099cc; }
        .btn-save { background: #0099cc; color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-save:hover { background: #007aaa; }
        #keyMsg { margin-top: 8px; font-size: 0.85em; padding: 8px 12px; border-radius: 6px; display: none; }
        #keyMsg.ok { background: #d4edda; color: #155724; display: block; }
        #keyMsg.err { background: #f8d7da; color: #721c24; display: block; }

        .capture-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 16px;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }
        .capture-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(17,153,142,0.4); }
        .capture-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        label { display: block; font-weight: 600; color: #333; margin-bottom: 8px; }
        textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1em;
            font-family: inherit;
            resize: vertical;
            min-height: 120px;
        }
        textarea:focus { outline: none; border-color: #667eea; }

        .btns { display: flex; gap: 10px; margin-top: 16px; }
        .btn-solve {
            flex: 1;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-solve:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.4); }
        .btn-solve:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-clear { padding: 14px 24px; background: #f0f0f0; color: #555; border: none; border-radius: 12px; cursor: pointer; font-size: 1em; }
        .btn-clear:hover { background: #e0e0e0; }

        .result {
            margin-top: 30px;
            padding: 22px;
            background: #f9f9f9;
            border-radius: 12px;
            border-left: 4px solid #667eea;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .result.show { display: block; }
        .result.err-box { background: #fff0f0; border-left-color: #e55; }
        .result h2 { color: #667eea; margin-bottom: 12px; }
        .result.err-box h2 { color: #e55; }
        .result p { color: #444; line-height: 1.8; white-space: pre-wrap; word-wrap: break-word; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .spinner {
            display: inline-block; width: 18px; height: 18px;
            border: 3px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .status-bar {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.9em;
            color: #856404;
            margin-bottom: 14px;
            display: none;
        }
        .status-bar.show { display: block; }

        @media (max-width: 600px) {
            .container { padding: 22px; }
            h1 { font-size: 1.8em; }
            .btns { flex-direction: column; }
            .api-row { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎓 Решатель Задач</h1>
    <p class="subtitle">Захвати экран или напиши задачу — решу за секунды</p>

    <div class="api-box">
        <h3>🔑 Groq API Ключ</h3>
        <p style="font-size:0.9em;color:#666">Бесплатный ключ: <a href="https://console.groq.com/keys" target="_blank">console.groq.com/keys</a></p>
        <div class="api-row">
            <input type="password" id="apiKey" placeholder="gsk_...">
            <button class="btn-save" onclick="saveKey()">Сохранить</button>
        </div>
        <div id="keyMsg"></div>
    </div>

    <button class="capture-btn" id="captureBtn" onclick="captureScreen()">
        🖥️ Захватить экран и распознать задачу
    </button>

    <div class="status-bar" id="statusBar"></div>

    <div>
        <label for="taskInput">Задача:</label>
        <textarea id="taskInput" placeholder="Или введите задачу вручную..."></textarea>
    </div>

    <div class="btns">
        <button class="btn-solve" id="solveBtn" onclick="solve()">🧠 Решить</button>
        <button class="btn-clear" onclick="clearAll()">✕ Очистить</button>
    </div>

    <div class="result" id="result">
        <h2>✅ Решение:</h2>
        <p id="resultText"></p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
    const GROQ = "https://api.groq.com/openai/v1/chat/completions";

    // Загрузить ключ из памяти
    window.onload = () => {
        const k = localStorage.getItem('groq_key');
        if (k) {
            document.getElementById('apiKey').value = k;
            showKeyMsg('✅ Ключ загружен', 'ok');
        }
    };

    function saveKey() {
        const k = document.getElementById('apiKey').value.trim();
        if (!k.startsWith('gsk_')) { showKeyMsg('❌ Ключ должен начинаться с gsk_', 'err'); return; }
        localStorage.setItem('groq_key', k);
        showKeyMsg('✅ Ключ сохранён!', 'ok');
    }

    function showKeyMsg(msg, type) {
        const el = document.getElementById('keyMsg');
        el.textContent = msg;
        el.className = type;
    }

    function setStatus(msg) {
        const bar = document.getElementById('statusBar');
        bar.textContent = msg;
        bar.className = msg ? 'status-bar show' : 'status-bar';
    }

    // Захват экрана через getDisplayMedia
    async function captureScreen() {
        const btn = document.getElementById('captureBtn');
        try {
            setStatus('⏳ Выберите экран или окно для захвата...');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Ожидание...';

            // Запрос на захват экрана
            const stream = await navigator.mediaDevices.getDisplayMedia({
                video: { mediaSource: 'screen' }
            });

            setStatus('📸 Делаю снимок...');

            // Снять кадр через video + canvas
            const video = document.createElement('video');
            video.srcObject = stream;
            await video.play();

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            // Остановить захват
            stream.getTracks().forEach(t => t.stop());

            setStatus('🔤 Распознаю текст...');

            // OCR через Tesseract.js
            const { data: { text } } = await Tesseract.recognize(canvas, 'rus+eng', {
                logger: m => {
                    if (m.status === 'recognizing text') {
                        setStatus(`🔤 Распознаю текст... ${Math.round(m.progress * 100)}%`);
                    }
                }
            });

            const cleaned = text.trim();
            if (!cleaned) {
                setStatus('⚠️ Текст не распознан. Попробуйте ещё раз.');
            } else {
                document.getElementById('taskInput').value = cleaned;
                setStatus('✅ Текст распознан! Нажмите "Решить"');
            }

        } catch (e) {
            if (e.name === 'NotAllowedError') {
                setStatus('❌ Доступ к экрану запрещён. Разрешите в браузере.');
            } else {
                setStatus('❌ Ошибка: ' + e.message);
            }
        } finally {
            btn.disabled = false;
            btn.innerHTML = '🖥️ Захватить экран и распознать задачу';
        }
    }

    // Решить задачу
    async function solve() {
        const key = localStorage.getItem('groq_key') || document.getElementById('apiKey').value.trim();
        if (!key) { alert('❌ Сначала добавьте API ключ!'); return; }

        const task = document.getElementById('taskInput').value.trim();
        if (!task) { alert('Введите задачу!'); return; }

        const btn = document.getElementById('solveBtn');
        const result = document.getElementById('result');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Решаю...';
        result.className = 'result';

        try {
            const res = await fetch(GROQ, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + key
                },
                body: JSON.stringify({
                    model: 'llama-3.1-8b-instant',
                    max_tokens: 2048,
                    messages: [{
                        role: 'user',
                        content: 'Реши задачу на русском языке, дай пошаговое решение и ответ:\n\n' + task
                    }]
                })
            });

            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.error?.message || res.statusText);
            }

            const data = await res.json();
            document.getElementById('resultText').textContent = data.choices[0].message.content;
            result.className = 'result show';
            setStatus('');

        } catch (e) {
            document.getElementById('resultText').textContent = 'Ошибка: ' + e.message;
            result.className = 'result show err-box';
            result.querySelector('h2').textContent = '❌ Ошибка';
        } finally {
            btn.disabled = false;
            btn.innerHTML = '🧠 Решить';
        }
    }

    function clearAll() {
        document.getElementById('taskInput').value = '';
        document.getElementById('result').className = 'result';
        setStatus('');
    }
</script>
</body>
</html>
