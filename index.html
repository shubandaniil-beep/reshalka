<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 Решатель Задач</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .api-key-section {
            background: #e8f4f8;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 2px solid #0099cc;
        }

        .api-key-section h3 {
            color: #0099cc;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .api-key-section p {
            color: #666;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .api-key-section a {
            color: #0099cc;
            text-decoration: underline;
        }

        .api-key-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        #apiKeyInput {
            flex: 1;
            padding: 12px;
            border: 2px solid #ccc;
            border-radius: 8px;
            font-size: 0.9em;
            font-family: monospace;
        }

        #apiKeyInput:focus {
            outline: none;
            border-color: #0099cc;
        }

        .api-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        #saveKeyBtn {
            background: #0099cc;
            color: white;
        }

        #saveKeyBtn:hover {
            background: #0077aa;
        }

        #clearKeyBtn {
            background: #ccc;
            color: #333;
        }

        #clearKeyBtn:hover {
            background: #aaa;
        }

        #keyStatus {
            margin-top: 10px;
            font-size: 0.9em;
            padding: 10px;
            border-radius: 6px;
            display: none;
        }

        #keyStatus.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        #keyStatus.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 1.1em;
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1em;
            font-family: inherit;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        button {
            flex: 1;
            padding: 15px 30px;
            font-size: 1.1em;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .solve-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .solve-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .solve-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .clear-btn {
            background: #f5f5f5;
            color: #333;
        }

        .clear-btn:hover {
            background: #e0e0e0;
        }

        .result {
            margin-top: 40px;
            padding: 25px;
            background: #f9f9f9;
            border-radius: 12px;
            border-left: 4px solid #667eea;
            display: none;
        }

        .result.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .result p {
            color: #555;
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.95em;
        }

        .error {
            background: #fee;
            border-left-color: #f66;
            color: #c33;
        }

        .error h2 {
            color: #c33;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info {
            background: #f0f7ff;
            border: 1px solid #b3d9ff;
            border-radius: 8px;
            padding: 15px;
            color: #004085;
            font-size: 0.95em;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 2em;
            }

            .button-group {
                flex-direction: column;
            }

            .api-key-input-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 Решатель Задач</h1>
            <p>Напишите задачу и получите решение за секунды</p>
        </div>

        <!-- API Key Section -->
        <div class="api-key-section">
            <h3>🔑 Groq API Ключ</h3>
            <p>Получить бесплатный ключ: <a href="https://console.groq.com/keys" target="_blank">console.groq.com/keys</a></p>
            <div class="api-key-input-group">
                <input type="password" id="apiKeyInput" placeholder="Вставьте ваш Groq API ключ (gsk_...)">
                <button id="saveKeyBtn" class="api-btn">Сохранить</button>
                <button id="clearKeyBtn" class="api-btn">Очистить</button>
            </div>
            <div id="keyStatus"></div>
        </div>

        <div class="info">
            <strong>💡 Подсказка:</strong>
            Вводите задачу или захватите экран - решу за 2-5 секунд!
        </div>

        <form id="taskForm">
            <div class="form-group">
                <label for="taskInput">Введите задачу:</label>
                <textarea
                    id="taskInput"
                    placeholder="Например: Решить уравнение: 2x + 5 = 13&#10;&#10;Или: Найти площадь прямоугольника со сторонами 5см и 8см&#10;&#10;Или: Написать синоним слова 'быстро'"
                    required></textarea>
            </div>

            <div class="button-group">
                <button type="submit" class="solve-btn" id="solveBtn">
                    🧠 Решить задачу
                </button>
                <button type="button" class="clear-btn" onclick="clearForm()">
                    ✕ Очистить
                </button>
            </div>
        </form>

        <div class="result" id="result">
            <h2>✅ Решение:</h2>
            <p id="resultText"></p>
        </div>
    </div>

    <script>
        const GROQ_API = "https://api.groq.com/openai/v1/chat/completions";

        // DOM элементы
        const form = document.getElementById('taskForm');
        const taskInput = document.getElementById('taskInput');
        const solveBtn = document.getElementById('solveBtn');
        const result = document.getElementById('result');
        const resultText = document.getElementById('resultText');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const clearKeyBtn = document.getElementById('clearKeyBtn');
        const keyStatus = document.getElementById('keyStatus');

        // Загрузить ключ при загрузке страницы
        window.addEventListener('load', () => {
            const savedKey = localStorage.getItem('groqApiKey');
            if (savedKey) {
                apiKeyInput.value = savedKey;
                updateKeyStatus('✅ Ключ загружен из памяти', 'success');
            }
        });

        // Сохранить ключ
        saveKeyBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (!key) {
                updateKeyStatus('❌ Введите API ключ', 'error');
                return;
            }
            if (!key.startsWith('gsk_')) {
                updateKeyStatus('❌ Ключ должен начинаться с gsk_', 'error');
                return;
            }
            localStorage.setItem('groqApiKey', key);
            updateKeyStatus('✅ Ключ сохранен!', 'success');
        });

        // Очистить ключ
        clearKeyBtn.addEventListener('click', () => {
            apiKeyInput.value = '';
            localStorage.removeItem('groqApiKey');
            keyStatus.textContent = '';
            keyStatus.className = '';
        });

        function updateKeyStatus(message, type) {
            keyStatus.textContent = message;
            keyStatus.className = type;
        }

        // Получить ключ
        function getApiKey() {
            return localStorage.getItem('groqApiKey') || '';
        }

        // Решить задачу
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const apiKey = getApiKey();
            if (!apiKey) {
                alert('❌ Пожалуйста, сначала добавьте API ключ');
                apiKeyInput.focus();
                return;
            }

            const task = taskInput.value.trim();
            if (!task) {
                alert('Пожалуйста, введите задачу');
                return;
            }

            solveBtn.disabled = true;
            solveBtn.innerHTML = '<span class="spinner"></span>Решаю...';
            result.classList.remove('show', 'error');

            try {
                const response = await fetch(GROQ_API, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'llama-3.1-8b-instant',
                        messages: [
                            {
                                role: 'user',
                                content: `Реши эту задачу на русском языке кратко:\n\n${task}\n\nДай пошаговое решение и ответ.`
                            }
                        ],
                        max_tokens: 2048
                    })
                });

                if (!response.ok) {
                    throw new Error(`Ошибка API: ${response.statusText}`);
                }

                const data = await response.json();
                const solution = data.choices[0].message.content;

                result.classList.add('show');
                resultText.textContent = solution;

            } catch (error) {
                result.classList.add('show', 'error');
                result.querySelector('h2').textContent = '❌ Ошибка';
                resultText.textContent = `Ошибка: ${error.message}\n\nПроверьте API ключ и интернет.`;
            } finally {
                solveBtn.disabled = false;
                solveBtn.innerHTML = '🧠 Решить задачу';
            }
        });

        function clearForm() {
            taskInput.value = '';
            result.classList.remove('show', 'error');
            taskInput.focus();
        }

        taskInput.focus();
    </script>
</body>
</html>
